<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就活・企業テスト情報共有サイト | TestShare</title>
    <meta name="description" content="就活生のための企業別Webテスト・筆記試験情報の共有プラットフォーム。SPI、玉手箱、TG-WEBなどの情報を検索・共有しよう。">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="header">
        <div class="container header-content">
            <h1 class="logo"><i class="ph-fill ph-student"></i> TestShare</h1>
            <button id="open-register-btn" class="btn btn-primary">
                <i class="ph ph-plus"></i> テスト情報を登録
            </button>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h2>企業のテスト情報を<br><span class="text-gradient">検索・共有</span>しよう</h2>
            <p>就活生同士で企業のWebテストや筆記試験の情報を共有するプラットフォームです。</p>
        </section>

        <section class="search-section glass-panel">
            <div class="search-controls">
                <div class="input-group search-input-group">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="企業名で検索... (例: 株式会社サンプル)">
                </div>
                <div class="input-group select-group">
                    <i class="ph ph-funnel"></i>
                    <select id="filter-select">
                        <option value="all">すべてのテスト</option>
                        <option value="SPI">SPI</option>
                        <option value="玉手箱">玉手箱</option>
                        <option value="TG-WEB">TG-WEB</option>
                        <option value="GAB/CAB">GAB / CAB</option>
                        <option value="コーディングテスト">コーディングテスト</option>
                        <option value="独自テスト">独自テスト</option>
                        <option value="その他">その他</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="results-section">
            <div class="results-header">
                <h3>最近の登録</h3>
                <span id="results-count" class="badge">0 件</span>
            </div>
            <div id="cards-container" class="cards-grid">
                <!-- Cards will be injected here by JS -->
            </div>
            <div id="no-results" class="no-results hidden">
                <i class="ph ph-files"></i>
                <p>該当する企業・テスト情報が見つかりませんでした。</p>
            </div>
        </section>
    </main>

    <!-- Modal -->
    <div id="register-modal" class="modal-overlay hidden">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h3>テスト情報を登録</h3>
                <button id="close-modal-btn" class="btn-icon"><i class="ph ph-x"></i></button>
            </div>
            <form id="register-form" class="modal-form">
                <div class="form-group">
                    <label for="company-name">企業名 <span class="required">*</span></label>
                    <input type="text" id="company-name" required placeholder="正式名称で入力 (例: 株式会社テスト)">
                </div>
                <div class="form-group">
                    <label for="test-type">テストの種類 <span class="required">*</span></label>
                    <select id="test-type" required>
                        <option value="" disabled selected>選択してください</option>
                        <option value="SPI">SPI</option>
                        <option value="玉手箱">玉手箱</option>
                        <option value="TG-WEB">TG-WEB</option>
                        <option value="GAB/CAB">GAB / CAB</option>
                        <option value="コーディングテスト">コーディングテスト</option>
                        <option value="独自テスト">独自テスト</option>
                        <option value="その他">その他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="test-date">受験時期</label>
                    <input type="month" id="test-date" placeholder="YYYY-MM">
                </div>
                <div class="form-group">
                    <label for="details">詳細内容・アドバイス</label>
                    <textarea id="details" rows="4" placeholder="テストの形式、難易度、対策方法などを自由に共有してください。"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-btn" class="btn btn-secondary">キャンセル</button>
                    <button type="submit" class="btn btn-primary">登録する</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
        <i class="ph-fill ph-check-circle"></i>
        <span>登録が完了しました！</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
